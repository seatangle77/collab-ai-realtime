name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # 3. 构建前端
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # 4. 将前端构建产物上传到服务器
      - name: Upload frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "web/dist/"
          target: "/root/workspace/collab-ai-realtime/web/"
          strip_components: 1

      # 5. SSH 服务器：更新后端代码并重启服务
      - name: Deploy backend & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /root/workspace/collab-ai-realtime

            # 拉取最新代码
            git fetch origin main
            git reset --hard origin/main

            # 更新 Python 依赖
            cd backend
            source venv/bin/activate
            # 先装预编译的 webrtcvad-wheels（提供 webrtcvad 模块，但包名不同）
            pip install webrtcvad-wheels -q
            # resemblyzer 依赖 webrtcvad，用 --no-deps 跳过，避免触发 gcc 编译
            pip install resemblyzer --no-deps -q
            # 安装其余依赖
            pip install -r requirements.txt -q

            # 重启后端（用端口 kill，避免误杀 SSH 进程）
            fuser -k 8000/tcp || true
            nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
            disown

            echo "✅ 部署完成"
