name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # 3. 构建前端
      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      # 4. 将前端构建产物上传到服务器
      - name: Upload frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "web/dist/"
          target: "/root/workspace/collab-ai-realtime/web/"
          strip_components: 1

      # 5. SSH 服务器：更新后端与 agent，并重启服务
      - name: Deploy backend and agent
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            export PATH="/root/.nvm/versions/node/v22.22.2/bin:$PATH"

            # ── 1. 停服务 ──────────────────────────────────────────
            systemctl stop collab-ai-agent
            systemctl stop collab-ai

            # ── 2. 拉取最新代码 ────────────────────────────────────
            cd /root/workspace/collab-ai-realtime
            git fetch origin main
            git reset --hard origin/main

            # ── 3. 更新 backend 依赖 ───────────────────────────────
            cd /root/workspace/collab-ai-realtime/backend
            source venv/bin/activate
            pip install -r requirements.txt -q

            # ── 4. 更新 agent 依赖并构建 ───────────────────────────
            cd /root/workspace/collab-ai-realtime/agent
            npm ci
            npm run build

            # ── 5. 重启 Redis ──────────────────────────────────────
            systemctl restart redis-server

            # ── 6. 启动 backend ────────────────────────────────────
            systemctl start collab-ai

            # ── 7. 更新 agent systemd 启动命令并启动 ──────────────
            sed -i 's|^ExecStart=.*|ExecStart=/bin/bash /root/workspace/collab-ai-realtime/agent/start.sh|' /etc/systemd/system/collab-ai-agent.service
            systemctl daemon-reload
            systemctl start collab-ai-agent

            # ── 8. Nginx 检查配置并 reload ─────────────────────────
            nginx -t && systemctl reload nginx

            echo "✅ 部署完成"
